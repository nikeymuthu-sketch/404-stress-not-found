<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Stress Not Found ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Floating Background -->
    <div class="background">
        <div class="hearts"></div>
    </div>

    <!-- Nini -->
    <div class="nini-section">

        <img
            id="nini"
            src="images/nini.png"
            alt="Nini">

        <div class="speech">

            <h1 id="title">
                Hii!! I'm Nini! 🐰
            </h1>

            <p id="message">
                I heard my favorite human had a really long day... 💛<br><br>

                So I made a tiny place where you can forget work for a few minutes.

                Ready?
            </p>

            <button onclick="nextScene()">
                Let's Go ❤️
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
