<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Stress Not Found 💗</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="background">
    <div class="hearts"></div>
</div>

<div class="container fade">

            <div id="message"></div>

        </div>

    </div>

</div>

<script src="script.js"></script>
